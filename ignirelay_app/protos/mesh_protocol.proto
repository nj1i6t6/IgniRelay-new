syntax = "proto3";
package resqmesh;

// 定義事件型別
enum EventType {
  RESOURCE_REGISTER = 0;   // 物資登記
  REQUEST_BROADCAST = 1;   // 需求廣播 (含 QoS)
  MATCH_INTENT      = 2;   // 意向匹配
  PHYSICAL_HANDSHAKE= 3;   // 物理核銷交割
  HAZARD_MARKER     = 4;   // 動態危險圖層標記
  QUARANTINE_VOTE   = 5;   // 惡意節點檢舉投票 (去中心化隔離)
  MATCH_CANCEL      = 6;   // 釋放配對 (PIN 解鎖失敗取消)
  FIRE_ALARM_RF     = 7;   // 433MHz RF 住警器火警訊號（由 Tier 0 基地台轉譯注入）
  MATCH_CONFIRM     = 8;   // 需求者確認媒合（回覆給供給者 + 廣播預訂通知）
  MATCH_REJECT      = 9;   // 需求者拒絕媒合（request 已失效）
  MATCH_INQUIRY     = 10;  // 詢問物資是否還在
  MATCH_AVAILABLE   = 11;  // 回覆：還在
  MATCH_GONE        = 12;  // 回覆：沒了
  CHAT_MESSAGE      = 13;  // 聊天訊息
  LOCATION_UPDATE   = 14;  // 媒合中位置同步
  // ── New slots (must mirror lib/app/mesh/event_types.dart) ──
  // 這些值原本只在 Dart 端 event_types.dart 定義，proto enum 漏補；導致
  // encodeWirePayload 的 `EventType.valueOf(15/16/17/18)` 回 null → fallback
  // 成 RESOURCE_REGISTER(0)，使 matchRequest / handshakeComplete 等事件在 wire
  // 上被壓成 type=0、收端 sig-fail。補齊後 wire type 與簽章 canonical 一致。
  MATCH_REQUEST      = 15;  // 需求方主動發起媒合（社區「我需要」）
  HANDSHAKE_COMPLETE = 16;  // 實體交接完成
  STATION_CLAIM      = 17;  // 站點認領
  STATION_RESPONSE   = 18;  // 站點回覆
}

// 檢傷及優先級定義 (QoS & Triage)
enum UrgencyLevel {
  INFO        = 0; // 一般資訊 (最低優先)
  RESOURCE    = 1; // 物資交換
  SOS_YELLOW  = 2; // 求援 - 非立即生命危險
  SOS_RED     = 3; // 求援 - 立即生命危險 (具有路由搶佔權)
}

// 核心 Event Log 結構
message MeshEvent {
  string event_id = 1;           // UUID / SHA-256 Hash
  bytes sender_pub_key = 2;      // 發送者 Ed25519 Public Key (固定 32 bytes)
  uint32 identity_level = 3;     // 信任等級 (0=匿名, 1=手機驗證, 2=社群背書, 3=政府實名)
  EventType type = 4;            // 事件類型
  UrgencyLevel urgency = 5;      // 優先權重

  // 混合邏輯時鐘 (HLC)
  int64 hlc_timestamp = 6;       // HLC 物理時間部分 (Unix ms)
  int64 hlc_counter = 7;         // HLC 邏輯計數器 

  int32 ttl = 8;                 // 剩餘存活跳數

  // 事件原始座標 (Origin Location — 創建者設定，中繼節點禁止修改)
  // 用於地理圍欄路由判斷：確認封包屬於哪個里/鄉鎮市區。
  // optional：無 GPS 時不寫入；接收端以 hasOriginLat() 判斷是否存在。
  optional double origin_lat = 15;   // 事件創建者的緯度（發送時設定，不隨轉發改變）
  optional double origin_lng = 16;   // 事件創建者的經度（發送時設定，不隨轉發改變）

  // 接收位置快照 (Received Location Snapshot — 每跳由接收方覆寫)
  // optional：無 GPS 時不寫入；接收端以 hasReceivedLat() 判斷是否存在。
  optional double received_lat = 13; // 接收機的緯度
  optional double received_lng = 14; // 接收機的經度

  // 分塊傳輸機制 (Chunking)
  int32 chunk_index = 9;         // 當前區塊索引 (若無分塊為 0)
  int32 total_chunks = 10;       // 總區塊數 (若無分塊為 1)

  bytes payload = 11;            // 序列化的具體業務資料 (見下方 Sub-Message 定義)

  bytes signature = 12;          // Ed25519 私鑰簽章 (固定 64 bytes)
}

// Bloom Filter 同步握手封包
message BloomFilterSync {
  bytes filter_data = 1;
  int32 num_hash_funcs = 2;      // 固定值: 7
  int32 capacity = 3;            // 一般節點預設 5000
}

// 物資登記 (EventType.RESOURCE_REGISTER)
message ResourceData {
  string resource_id = 1;        // 物資唯一 ID
  string resource_type = 2;      // 物資類型代碼 ("WATER" / "GENERATOR")
  string description = 3;        // 文字補充說明
  float quantity = 4;            // 數量
  string unit = 5;               // 單位
  float max_range_meters = 6;    // Provider 願意移動的最大服務半徑 (公尺)
  optional double lat = 7;      // Provider 目前緯度（無 GPS 時缺席）
  optional double lng = 8;      // Provider 目前經度（無 GPS 時缺席）
  int64 expires_at = 9;         // 物資有效期限 (Unix ms, 0 = 無期限)
  // 注意：tags 10–15 已保留，未來可擴充據點相關欄位
  string delivery_mode = 16;    // 配送方式 ("PICKUP" / "DELIVER" / "EITHER")
}

// 需求廣播 (EventType.REQUEST_BROADCAST)
message RequestData {
  string request_id = 1;         // 需求唯一 ID
  string resource_type = 2;      // 所需物資類型代碼
  string description = 3;        // 補充說明
  float quantity_needed = 4;     // 需求數量
  UrgencyLevel urgency = 5;      // 緊急度
  optional double lat = 6;      // Requester 目前緯度（無 GPS 時缺席）
  optional double lng = 7;      // Requester 目前經度（無 GPS 時缺席）
  float max_range_meters = 8;   // Requester 願意等候的最大服務半徑 (公尺)
  string mobility_mode = 9;     // 移動模式 ("WALK" / "VEHICLE" / "STATIONARY")
  string note = 10;             // 補充備註
}

// 媒合意向 (EventType.MATCH_INTENT)
message MatchIntentData {
  string request_id = 1;         // 對應需求 ID
  string resource_id = 2;        // 對應物資 ID
  bytes requester_pub_key = 3;   // Requester 公鑰 (32 bytes)
  bytes provider_pub_key = 4;    // Provider 公鑰 (32 bytes)
  float match_score = 5;         // 計算得出的媒合分數 (0~100)
  int64 match_expires_at = 6;    // Match 超時時間戳
}

// 物理交割憑證 (EventType.PHYSICAL_HANDSHAKE)
message PhysicalHandshakeData {
  string resource_id = 1;        // 物資 ID
  string request_id = 2;         // 需求 ID
  bytes requester_pub_key = 3;   // Requester 公鑰 (32 bytes)
  bytes provider_pub_key = 4;    // Provider 公鑰 (32 bytes)
  bytes requester_signature = 5; // Requester 對本次交割的 Ed25519 簽章
  bytes provider_signature = 6;  // Provider 對本次交割的 Ed25519 簽章
  string method = 7;             // 交割方式: "QR_CODE" / "BLE" / "PIN_4DIGIT"
}

// 動態危險標記 (EventType.HAZARD_MARKER)
message HazardData {
  string hazard_id = 1;          // 危險標記唯一 ID
  string hazard_type = 2;        // "ROADBLOCK" / "FIRE" / "CHEMICAL" / "FLOOD"
  uint32 severity = 3;           // 嚴重度 1~5
  double center_lat = 4;         // 中心點緯度
  double center_lng = 5;         // 中心點經度
  float radius_meters = 6;       // 影響半徑 (公尺)
  int64 observed_at = 7;         // 觀察時間 (Unix ms)
  string description = 8;        // 使用者描述
  bool is_confirmation = 9;      // true = 附議確認事件（不建立新標記）
}

// 惡意節點檢舉投票 (EventType.QUARANTINE_VOTE)
message QuarantineVoteData {
  bytes target_pub_key = 1;      // 被檢舉節點的公鑰 (32 bytes)
  string reason = 2;             // 檢舉原因代碼
  float vote_weight = 3;         // 發票方的投票權重 (由 identity_level 決定: 0.2/0.5/0.8/1.0)
}

// 釋放配對 (EventType.MATCH_CANCEL)
message MatchCancelData {
  string request_id = 1;      // 要取消的需求 ID
  string resource_id = 2;     // 要釋放的物資 ID
  string reason = 3;          // 取消原因代碼
  string negotiation_id = 4;  // 關聯的協商 ID（可選）
}

// 醫療卡摘要 (附加在 SOS 廣播 payload 中，僅包含用戶授權的欄位)
message MedicalSummary {
  optional string name = 1;              // 姓名
  optional int32  age = 2;               // 年齡
  optional int32  height_cm = 3;         // 身高 (公分)
  optional int32  weight_kg = 4;         // 體重 (公斤)
  optional string blood_type = 5;        // 血型 (A+, A-, B+, B-, AB+, AB-, O+, O-)
  repeated string conditions = 6;        // 醫療狀況 (如 diabetes, epilepsy)
  repeated AllergyEntry allergies = 7;   // 過敏原與反應
  repeated string medications = 8;       // 目前正在服用的藥物
  optional EmergencyContact emergency_contact = 9; // 緊急聯絡人
  optional bool   organ_donor = 10;      // 器官捐贈意願
  optional string primary_language = 11; // 主要語言
}

// 過敏原條目
message AllergyEntry {
  string allergen = 1;   // 過敏原名稱
  string reaction = 2;   // 過敏反應描述
}

// 緊急聯絡人
message EmergencyContact {
  string phone = 1;      // 電話號碼
  string relation = 2;   // 與用戶的關係
}

// 433MHz RF 住警器火警訊號 (EventType.FIRE_ALARM_RF)
// 由 Tier 0 基地台接收傳統住警器 RF 訊號後轉譯生成，自動設為 SOS_RED 優先級
//
// ⚠ Wire-format 注意：
//   tag 2 在舊版草稿中曾定義為 uint32 rf_frequency_mhz；
//   此版本改為 int32 rssi，語意不同但 wire-type 相同（varint）。
//   因 0.2.0 尚未部署，目前無在野 payload，判定向後相容風險可接受。
//   若日後需新增 rf_frequency_mhz，請使用 tag 8 或更高。
//   tags 5–7 保留給未來擴充 (detected_at, raw_rf_payload 等)。
message FireAlarmRfData {
  string detector_brand = 1;  // 住警器品牌識別 (如 "HONG_LI", "TYY", "UNKNOWN")
  int32  rssi           = 2;  // 接收訊號強度 dBm (可用於粗估距離)
  double station_lat    = 3;  // 接收基地台緯度 (近似火警位置)
  double station_lng    = 4;  // 接收基地台經度
}

// 媒合確認 (EventType.MATCH_CONFIRM)
message MatchConfirmData {
  string request_id = 1;
  string resource_id = 2;
  bytes requester_pub_key = 3;
  bytes provider_pub_key = 4;
}

// 媒合拒絕 (EventType.MATCH_REJECT)
message MatchRejectData {
  string request_id = 1;
  string resource_id = 2;
  string reason = 3;         // "REQUEST_EXPIRED" / "ALREADY_MATCHED" / "ALREADY_LOCKED"
}

// 物資確認詢問 (EventType.MATCH_INQUIRY)
message MatchInquiryData {
  string resource_id = 1;       // 要確認的物資 ID
  bytes inquirer_pub_key = 2;   // 詢問者公鑰
  string inquiry_id = 3;        // 詢問唯一 ID（用於追蹤回覆）
}

// 物資確認回覆 (EventType.MATCH_AVAILABLE / MATCH_GONE)
message MatchInquiryResponse {
  string inquiry_id = 1;
  string resource_id = 2;
  bool is_available = 3;
}

// 聊天訊息 (EventType.CHAT_MESSAGE)
message ChatMessageData {
  string room_id = 1;          // 行政區代碼或自訂 ID
  string room_type = 2;        // "nation" / "county" / "township" / "village" / "custom"
  string content = 3;          // 文字內容
  string reply_to = 4;         // 回覆的 message event_id（可選）
}

// 媒合中位置同步 (EventType.LOCATION_UPDATE)
message LocationUpdateData {
  string session_id = 1;           // Match_Sessions.session_id
  double lat = 2;                  // 目前緯度
  double lng = 3;                  // 目前經度
  int64 timestamp = 4;             // 更新時間 (Unix ms)
}

// 聊天室設定
message ChatRoomConfig {
  string room_id = 1;
  string room_name = 2;
  string room_type = 3;
  int32 rate_limit_seconds = 4;     // 發言間隔秒數（預設 180）
  bool admin_only = 5;              // 公告頻道（唯讀）
  string join_token_hash = 6;       // 加入驗證 hash
  repeated bytes admin_pub_keys = 7; // 管理員公鑰列表
}

// 媒合出價 — Provider 發起，帶有 negotiation_id 追蹤協商狀態
message MatchOfferData {
  string negotiation_id = 1;
  string resource_id = 2;
  string request_id = 3;
  bytes provider_pub_key = 4;
  bytes requester_pub_key = 5;
  float offered_qty = 6;
  float match_score = 7;
  int64 expires_at = 8;
}

// 媒合請求 — Requester 發起，帶有 negotiation_id
message MatchRequestData {
  string negotiation_id = 1;
  string resource_id = 2;
  string request_id = 3;
  bytes provider_pub_key = 4;
  bytes requester_pub_key = 5;
  float requested_qty = 6;
  int64 expires_at = 7;
}

// 媒合接受 — 任一方接受出價/請求
message MatchAcceptData {
  string negotiation_id = 1;
  string resource_id = 2;
  string request_id = 3;
  bytes acceptor_pub_key = 4;
  float agreed_qty = 5;
}

// 媒合拒絕（協商層）— 區別於 MatchRejectData（廣播層）
message MatchDeclineData {
  string negotiation_id = 1;
  string resource_id = 2;
  string request_id = 3;
  string reason = 4;
}

// 據點領取請求
message StationClaimData {
  string resource_id = 1;
  string request_id = 2;
  bytes requester_pub_key = 3;
  string category = 4;
  float requested_qty = 5;
}

// 據點領取回應
message StationResponseData {
  string resource_id = 1;
  string request_id = 2;
  bytes requester_pub_key = 3;
  bool approved = 4;
  float approved_qty = 5;
  string deny_reason = 6;
  int64 pickup_deadline = 7;
}

// ── BLE Mesh 廣播封包 ──────────────────────────────────

// MeshEnvelope 封裝類型（區分 Bloom Filter 交換與事件傳輸）
enum EnvelopeType {
  ENVELOPE_EVENT        = 0;  // 包含 MeshEvent 序列化 bytes
  ENVELOPE_BLOOM_FILTER = 1;  // 包含 Bloom Filter 資料（事件 ID 列表）
}

// MeshEnvelope — BLE Mesh 廣播頂層封包
// 所有透過 BLE Transport 傳送的資料都先包裝為此格式，
// 接收端根據 type 決定是進行 Bloom Filter 比對還是事件處理。
message MeshEnvelope {
  EnvelopeType type = 1;   // 封包類型
  bytes payload = 2;        // 內容（EVENT: MeshEvent bytes / BLOOM_FILTER: 事件 ID 列表）
  string sender_id = 3;     // 發送者 node UUID
}

// ─────────────────────────────────────────────────────────────────────────────
// HandshakeCompleteData (交割完成憑證)
// ─────────────────────────────────────────────────────────────────────────────
message HandshakeCompleteData {
  string negotiation_id = 1;
  string resource_id = 2;
  string request_id = 3;
  bytes provider_pub_key = 4;
  bytes requester_pub_key = 5;
  float actual_delivered_qty = 6;
  string method = 7;          // "QR_CODE" / "BLE" / "PIN_4DIGIT" / "DROP_OFF"
  bytes provider_signature = 8;
  bytes requester_signature = 9;
  // Stage 6 (commit #10)：wire-format 版本。
  // 預設 0 = 未升級之舊 client；新 client 寫入 1。
  // optional：使接收端可用 hasSchemaVersion() 區分「未帶此欄位的舊 payload」。
  optional int32 schema_version = 10;
}

// ═════════════════════════════════════════════════════════════════════════════
// v0.3 Envelope v2 — Stage 0c additions
// Spec: docs/specs/envelope_v2_spec_2026-05-13.md (decisions locked §20)
// Spec: docs/specs/native_transport_v1_2026-05-13.md (decisions locked §15)
//
// The legacy MeshEvent / MeshEnvelope above are kept for v0.2.x history; v0.3
// readers do NOT decode them. The new EventEnvelope v2 owns its own field-tag
// space starting at tag 1.
// ═════════════════════════════════════════════════════════════════════════════

// EventTypeV2 — v0.3 wire enum. Permanent reservations cover legacy v0.2 values.
// Naming convention: EVENT_TYPE_<GROUP>_<NAME>.
enum EventTypeV2 {
  EVENT_TYPE_UNSPECIFIED = 0;

  // 1-19  Personal / status
  EVENT_TYPE_STATUS_UPDATE        = 1;
  EVENT_TYPE_BATTERY_STATUS       = 2;
  reserved 3 to 9;
  reserved 10, 11, 12;   // legacy MATCH_INQUIRY/AVAILABLE/GONE — never reuse
  reserved 13;           // legacy CHAT_MESSAGE=13 — moved to 30
  reserved 14 to 19;

  // 20-49 Request / supply / coordination
  EVENT_TYPE_SUPPLY_REQUEST       = 20;
  EVENT_TYPE_SUPPLY_OFFER         = 21;
  EVENT_TYPE_MATCH_INTENT         = 22;
  EVENT_TYPE_NEGOTIATION          = 23;
  EVENT_TYPE_RELAY_TO_CONTACT     = 24;
  reserved 25 to 29;
  EVENT_TYPE_CHAT_MESSAGE         = 30;   // locked decision §20.1
  reserved 31 to 49;

  // 50-79 Hazard / disaster report
  EVENT_TYPE_HAZARD_MARKER        = 50;
  EVENT_TYPE_DISASTER_REPORT      = 51;
  EVENT_TYPE_SHELTER_STATUS       = 52;
  reserved 53 to 79;

  // 80-99 Official alerts
  EVENT_TYPE_OFFICIAL_ALERT_CAP     = 80;
  EVENT_TYPE_OFFICIAL_ALERT_SUMMARY = 81;
  reserved 82 to 99;

  // 100-129 Mesh / system / control
  EVENT_TYPE_PROTOCOL_HELLO       = 100;
  EVENT_TYPE_PROTOCOL_NOTICE      = 101;
  EVENT_TYPE_HEARTBEAT            = 102;
  EVENT_TYPE_TRACE_PING           = 103;
  EVENT_TYPE_TRACE_ACK            = 104;
  reserved 105 to 129;

  // 1000+ Experimental / local-only
  // Envelope MUST set is_experimental=true; relays SHOULD NOT propagate.
}

enum PriorityV2 {
  PRIORITY_UNSPECIFIED = 0;     // REJECTED on wire
  PRIORITY_SOS_RED     = 1;
  PRIORITY_SOS_YELLOW  = 2;
  PRIORITY_ALERT       = 3;
  PRIORITY_STATUS      = 4;
  PRIORITY_RESOURCE    = 5;
  PRIORITY_NORMAL      = 6;
}

// HLC pair — millis since epoch + tie-breaker counter; node_id implicit via author_key.
message HlcTimestampV2 {
  uint64 ms_since_epoch = 1;
  uint32 counter        = 2;
}

// EventEnvelope v2 — single-layer top-level wire envelope.
//
// Hot-path fields use single-byte varint tags (≤ 15). Tags 14-15 reserved for
// v0.4 additions before allocating multi-byte tags. payload_hash is NOT a wire
// field — it is computed locally as SHA-256(payload) and fed into the canonical
// signature input (see canonical_encoder.dart).
message EventEnvelopeV2 {
  uint32 protocol_version    = 1;     // v0.3 == 2
  bytes  envelope_id         = 2;     // 16 bytes; UUIDv7 (locked §20.3)
  EventTypeV2 event_type     = 3;
  PriorityV2  priority       = 4;
  HlcTimestampV2 created_at_hlc = 5;
  HlcTimestampV2 expires_at_hlc = 6;
  uint32 max_hops            = 7;     // initial hop budget chosen by author
  bytes  author_key          = 8;     // 32 bytes Ed25519 pubkey
  uint32 sig_algo            = 9;     // 0x01 = Ed25519 (v0.3 mandatory)
  bytes  signature           = 10;    // 64 bytes (Ed25519); covers canonical input incl. SHA-256(payload)
  bytes  payload             = 11;
  string last_relay_id       = 12;    // OPTIONAL on origin; set by relays
  bool   is_experimental     = 13;    // event_type >= 1000 MUST set true
  reserved 14 to 31;                  // hot-path single-byte headroom
}

// StatusUpdateData — snapshot payload for EVENT_TYPE_STATUS_UPDATE.
// Snapshot LWW: each new STATUS_UPDATE from the same author_key fully
// supersedes the prior one. Empty needs CLEARS prior needs.
message StatusUpdateData {
  enum SafetyState {
    SAFETY_STATE_UNSPECIFIED = 0;     // REJECTED on receive
    SAFETY_STATE_SAFE        = 1;
    SAFETY_STATE_UNSAFE      = 2;
    SAFETY_STATE_INJURED     = 3;
    SAFETY_STATE_TRAPPED     = 4;     // implies SOS_RED priority floor
  }
  enum NeedCategory {
    NEED_CATEGORY_UNSPECIFIED = 0;    // REJECTED on receive
    NEED_CATEGORY_WATER       = 1;
    NEED_CATEGORY_POWER       = 2;
    NEED_CATEGORY_MEDICINE    = 3;
    NEED_CATEGORY_FOOD        = 4;
    NEED_CATEGORY_SHELTER     = 5;
    NEED_CATEGORY_EVAC        = 6;
    reserved 7 to 31;
  }
  enum NeedSeverity {
    NEED_SEVERITY_UNSPECIFIED = 0;    // REJECTED on receive
    NEED_SEVERITY_WANT        = 1;
    NEED_SEVERITY_NEED        = 2;
    NEED_SEVERITY_URGENT      = 3;
  }
  message NeedEntry {
    NeedCategory category       = 1;
    NeedSeverity severity       = 2;
    HlcTimestampV2 expires_at_hlc = 3;
  }
  SafetyState safety_state = 1;
  repeated NeedEntry needs = 2;
  reserved 3 to 15;
}

// ProtocolHelloData — capability declaration exchanged once per BLE connection
// after MTU negotiation + service discovery (5s timeout → assume PhoneV1-legacy).
message ProtocolHelloData {
  enum PeerKind {
    PEER_KIND_UNSPECIFIED   = 0;      // REJECTED on receive
    PEER_KIND_PHONE_V1      = 1;
    PEER_KIND_BLE_NODE_V1   = 2;
    PEER_KIND_TIER0_MULE    = 3;
    PEER_KIND_PHONE_V1_LEGACY = 4;    // self-declaring legacy = drop connection (§5.7)
  }
  enum BgState {
    BG_STATE_UNSPECIFIED = 0;
    BG_STATE_FOREGROUND  = 1;
    BG_STATE_BACKGROUND  = 2;         // iOS background hint
    BG_STATE_DOZE        = 3;         // Android Doze mode hint
  }

  uint32 protocol_version          = 1;     // 2 in v0.3
  PeerKind peer_kind               = 2;
  uint32 max_rx_envelope_bytes     = 3;
  bool   supports_iblt             = 4;
  bool   supports_bloom_v2         = 5;
  bool   supports_chunking         = 6;     // MUST be true for PhoneV1
  uint32 min_negotiated_mtu        = 7;
  repeated string capabilities     = 8;     // opt-in flags ("shelter_status", ...)
  BgState bg_state                 = 9;
  reserved 10 to 15;
}
